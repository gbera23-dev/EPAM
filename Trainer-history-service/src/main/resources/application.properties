spring.application.name=Trainer-history-service

server.port=8081

# database credentials
spring.datasource.url=jdbc:h2:mem:Trainer_history_service_db;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER

spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.hikari.auto-commit=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
# JPA properties
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=true

# logger properties
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%5p) [%X{transactionId}] [%thread] %logger{36} : %msg%n


# JWT token properties

security.jwt_secret_key=98828a5361ff22f71844d7b16bf881af6e7870e013e79a323c0cd93893efece2

security.jwt_expiration_time=86400000

# Eureka properties

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true