
# Data files
data.TraineeDataPath=TraineeData.json

data.TrainerDataPath=TrainerData.json

data.TrainingDataPath=TrainingData.json

# database credentials
spring.datasource.url=jdbc:mysql://localhost:3306/Gym_CRM_db
spring.datasource.username=giga
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA properties
spring.jpa.show_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


# AOP properties
spring.aop.proxy-target-class=true
spring.jpa.open-in-view=true

# Spring Boot actuator and health properties
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# logger properties
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%5p) [%X{transactionId}] [%thread] %logger{36} : %msg%n


