
# Data files

data.TraineeDataPath=TraineeData.json

data.TrainerDataPath=TrainerData.json

data.TrainingDataPath=TrainingData.json

# database credentials
db.url=jdbc:mysql://localhost:3306/Gym_CRM_db
db.username=giga
db.password=
db.driver =com.mysql.cj.jdbc.Driver

# JPA properties
jpa.packages_to_scan=app.entities
hibernate.show_sql=true
hibernate.hbm2ddl.auto=update


# tomcat properties
server.tomcat.threads.max=200
server.max-http-request-header-size=8KB
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=logs
server.tomcat.accesslog.file-date-format=yyyy-MM-dd
server.tomcat.accesslog.prefix=access_log
server.tomcat.accesslog.suffix=.log


# logger properties
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%5p) [%X{transactionId}] [%thread] %logger{36} : %msg%n
