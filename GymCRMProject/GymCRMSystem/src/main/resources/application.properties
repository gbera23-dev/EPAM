
# Data files
data.TraineeDataPath=TraineeData.json

data.TrainerDataPath=TrainerData.json

data.TrainingDataPath=TrainingData.json

# AOP properties
spring.aop.proxy-target-class=true

# Spring Boot actuator and health properties
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# logger properties
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %clr(%5p) [%X{transactionId}] [%thread] %logger{36} : %msg%n


# JWT token properties

security.jwt_secret_key=98828a5361ff22f71844d7b16bf881af6e7870e013e79a323c0cd93893efece2

security.jwt_expiration_time=86400000

# default profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}


# Trainer history service information
microservice.TrainerHistoryService.URI=http://gymcrmmicroserviceapp:8081

# Eureka properties
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=false
eureka.client.service-url.defaultZone=http://gymcrmdiscoveryapp:8761/eureka/


# Circuit breaker properties
spring.cloud.openfeign.circuitbreaker.enabled=true

# Feign Client Timeouts (Global Defaults)
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=10000

# Resilience4j Time Limiter
resilience4j.timelimiter.configs.default.timeoutDuration=12s

# ActiveMQ broker information
spring.activemq.broker-url=http://activemqbroker?broker.persistent=false
spring.activemq.packages.trust-all=true
